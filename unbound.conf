server:
  # Listening interfaces
  interface: 0.0.0.0
  interface: ::0
  port: 5353

  # Allow queries from cluster and local networks
  # Allow entire 10.x.x.x private network (includes cluster service CIDR)
  access-control: 10.0.0.0/8 allow
  access-control: 172.16.0.0/12 allow
  access-control: 127.0.0.0/8 allow
  access-control: ::1 allow
  access-control: fd00:7808:88c3:90::/64 allow

  # Do not query localhost
  do-not-query-localhost: no

  # Cache settings
  cache-max-ttl: 86400
  cache-min-ttl: 60
  cache-max-negative-ttl: 3600

  # Threading
  num-threads: 4

  # Privacy

  # Prefetch
  prefetch: yes

  # Root hints for recursive resolution

  # Logging
  log-queries: no
  log-replies: no

  # Statistics (optional - enable via ENV)
  # statistics-interval: 0
  # extended-statistics: no

# DNSSEC validation disabled by default (simpler)
# Uncomment to enable:
# val-clean-additional: yes
# trust-anchor-file: "/etc/unbound/root.key"
