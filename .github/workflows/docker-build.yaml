name: Docker Build and Push to Docker Hub

on:
  push:
    tags:
      - 'v*'  # Semantic version tags like v1.0.0, v1.20.0

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # For actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/unbound:${{ github.ref_name }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/unbound:latest
          platforms: linux/amd64

      - name: Sync README to Docker Hub
        # Docker Hub does not auto-sync README from GitHub Actions pushes.
        # This step explicitly updates the repository description via the API.
        run: |
          # Read README and prepare JSON payload
          README_CONTENT=$(cat README.md | python3 -c "import sys, json; print(json.dumps(sys.stdin.read()))")
          PAYLOAD=$(jq -n \
            --arg desc "Lightweight recursive DNS resolver with caching, built on Alpine Linux" \
            --arg full_desc "$README_CONTENT" \
            '{full_description: $full_desc, description: $desc, full_name: "luis/unbound"}')

          # Send PATCH request to Docker Hub API
          curl -s -X PATCH \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DOCKERHUB_TOKEN }}" \
            -d "$PAYLOAD" \
            "https://hub.docker.com/v2/repositories/luifrancisco/unbound/" \
            | jq .
