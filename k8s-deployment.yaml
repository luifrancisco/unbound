apiVersion: v1
kind: Namespace
metadata:
  name: unbound
  labels:
    kubernetes.io/metadata.name: unbound
spec:
  finalizers:
  - kubernetes
---
apiVersion: v1
data:
  unbound.conf: "server:\n  interface: 0.0.0.0\n  interface: ::0\n  port: 53\n  access-control:\
    \ 10.43.0.0/16 allow\n  access-control: 10.0.0.0/8 allow\n  access-control: 172.16.0.0/12\
    \ allow\n  access-control: 127.0.0.0/8 allow\n  access-control: ::1 allow\n  access-control:\
    \ fd00:7808:88c3:90::/64 allow\n  do-not-query-localhost: no\n  cache-max-ttl:\
    \ 86400\n  cache-min-ttl: 60\n  cache-max-negative-ttl: 3600\n  num-threads: 4\n\
    \  prefetch: yes\n  log-queries: no\n  log-replies: no\n  verbosity: 1\n"
kind: ConfigMap
metadata:
  name: unbound-config
  namespace: unbound
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: unbound-cache-pvc
  namespace: unbound
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: local-path
  volumeMode: Filesystem
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unbound
  namespace: unbound
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: unbound
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: unbound
    spec:
      containers:
      - command:
        - /usr/sbin/unbound
        - -d
        - -c
        - /etc/unbound/unbound.conf
        env:
        - name: TZ
          value: UTC
        image: docker.io/library/unbound-custom:latest
        imagePullPolicy: Never
        livenessProbe:
          failureThreshold: 3
          initialDelaySeconds: 15
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 53
          timeoutSeconds: 2
        name: unbound
        ports:
        - containerPort: 53
          name: dns-tcp
          protocol: TCP
        - containerPort: 53
          name: dns-udp
          protocol: UDP
        readinessProbe:
          failureThreshold: 3
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
          tcpSocket:
            port: 53
          timeoutSeconds: 2
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - NET_BIND_SERVICE
            drop:
            - ALL
          runAsGroup: 101
          runAsUser: 100
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/unbound/unbound.conf
          name: config
          subPath: unbound.conf
        - mountPath: /var/lib/unbound
          name: cache
        - mountPath: /var/log/unbound
          name: log
      dnsPolicy: ClusterFirst
      initContainers:
      - command:
        - sh
        - -c
        - chown -R 100:101 /var/lib/unbound
        image: busybox:latest
        imagePullPolicy: Always
        name: volume-permissions
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/lib/unbound
          name: cache
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: unbound-config
        name: config
      - name: cache
        persistentVolumeClaim:
          claimName: unbound-cache-pvc
      - emptyDir: {}
        name: log
