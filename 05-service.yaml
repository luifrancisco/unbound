apiVersion: v1
kind: Service
metadata:
  name: unbound
  namespace: unbound
spec:
  type: NodePort
  selector:
    app: unbound
  ports:
  - name: dns-tcp
    nodePort: 30153
    port: 53
    protocol: TCP
    targetPort: 53
  - name: dns-udp
    nodePort: 30153
    port: 53
    protocol: UDP
    targetPort: 53
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  sessionAffinity: None
